name: Improve Skills (eval-driven)

# Self-improving skills: runs scripts/improve-skill.mjs, which scores a skill,
# critiques it, rewrites the SKILL.md, and re-scores — keeping the rewrite only if
# it scores higher. Opens a PR with the improved skills + SKILL-IMPROVEMENTS.md.
# Uses the ANTHROPIC_API_KEY secret (the key never leaves GitHub).

on:
  workflow_dispatch:
    inputs:
      skills:
        description: 'Space-separated skill names, or "all" for every eval-case skill'
        required: true
        default: 'all'
  # Manual-only by design: this spends API credits, so it never runs on a schedule.
  # Trigger it yourself from the Actions tab when you want an improvement pass.

permissions:
  contents: write
  pull-requests: write

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Improve skills
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then echo "::error::ANTHROPIC_API_KEY secret is not set."; exit 1; fi
          INPUT="${{ github.event.inputs.skills || 'all' }}"
          if [ "$INPUT" = "all" ]; then
            node scripts/improve-skill.mjs --all
          else
            node scripts/improve-skill.mjs $INPUT
          fi

      - name: Open a PR with improvements
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            skills
            SKILL-IMPROVEMENTS.md
          branch: skill-improvements
          delete-branch: true
          commit-message: "chore(skills): eval-driven improvements"
          title: "🔁 Eval-driven skill improvements"
          body: |
            Auto-generated by the **Improve Skills** workflow. Each change was kept only
            because the rewrite scored higher on the eval rubric than the original.
            See `SKILL-IMPROVEMENTS.md` for the before→after scores. Review the diffs before merging.
